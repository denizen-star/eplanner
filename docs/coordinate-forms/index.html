<!DOCTYPE html>

    <title>Coordinate Form Variations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        :root {

            --accent-pink: #FFB6C1;

        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-secondary); color: var(--text-primary); padding: 40px 24px; }
        .wrap { max-width: 640px; margin: 0 auto; }
        h1 { font-size: 20px; margin-bottom: 8px; }
        p { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
        .links { display: flex; flex-wrap: wrap; gap: 12px; }
        a { display: inline-block; padding: 12px 20px; background: var(--bg-primary); border: 1px solid var(--border-primary); border-radius: 8px; text-decoration: none; color: var(--text-primary); font-size: 14px; font-weight: 500; transition: all 0.2s; }
        a:hover { border-color: var(--accent-pink); background: rgba(255,182,193,0.1); }
    </style>
</head>
