<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoordForm4 - Clean Flow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #F7F3ED;
            --text-primary: #2C2C2C;
            --text-secondary: #5A5A5A;
            --text-tertiary: #8A8A8A;
            --border-primary: #E5E0D8;
            --accent-pink: #FFB6C1;
            --accent-pink-hover: #FFC0CB;
            --accent-pink-light: #FFE4E9;
            --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-secondary); color: var(--text-primary); line-height: 1.5; font-size: 13px; }
        .main { max-width: 560px; margin: 0 auto; padding: 32px 24px; }
        .hero { background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=1200') center/cover; padding: 44px 24px; margin-bottom: -28px; }
        .hero h1 { color: var(--white); font-size: 20px; font-weight: 600; }
        .hero p { color: rgba(255,255,255,0.9); font-size: 12px; margin-top: 4px; }
        .card { background: var(--bg-primary); border: 1px solid var(--border-primary); border-radius: 12px; padding: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .subtext { font-size: 12px; color: var(--text-secondary); margin-bottom: 20px; }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-primary); margin-bottom: 5px; }
        .field input, .field textarea { width: 100%; padding: 9px 12px; font-size: 14px; border: 1px solid var(--border-primary); border-radius: 8px; background: var(--white); font-family: inherit; transition: border-color 0.2s; }
        .field input::placeholder, .field textarea::placeholder { color: var(--text-tertiary); }
        .field textarea { rows: 3; resize: vertical; min-height: 68px; }
        .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent-pink); box-shadow: 0 0 0 2px var(--accent-pink-light); }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 480px) { .row-2 { grid-template-columns: 1fr; } }
        .vis-options { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
        .vis-opt { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1px solid var(--border-primary); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .vis-opt:hover { border-color: var(--accent-pink); }
        .vis-opt input { margin: 0; accent-color: var(--accent-pink); }
        .vis-opt .t { font-size: 13px; font-weight: 600; color: var(--text-primary); }
        .vis-opt .d { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
        .btn { width: 100%; background: var(--accent-pink); color: var(--white); border: none; padding: 12px; font-size: 14px; font-weight: 500; border-radius: 8px; cursor: pointer; margin-top: 24px; }
        .btn:hover { background: var(--accent-pink-hover); }
    </style>
</head>
<body>
    <main class="main">
        <section class="hero">
            <h1>Coordinate an Event</h1>
            <p>Create and manage community events</p>
        </section>
        <div class="card">
            <p class="subtext">Submit to receive signup and management links.</p>
            <form>
                <div class="field">
                    <label>Planner Name *</label>
                    <input type="text" placeholder="e.g., John Smith" required>
                </div>
                <div class="field">
                    <label>Coordinator Email *</label>
                    <input type="email" placeholder="coordinator@example.com" required>
                </div>
                <div class="field">
                    <label>Event Title</label>
                    <input type="text" placeholder="Optional">
                </div>
                <div class="row-2">
                    <div class="field">
                        <label>Date & Start Time *</label>
                        <input type="datetime-local" step="1800" required>
                    </div>
                    <div class="field">
                        <label>End Time</label>
                        <input type="datetime-local" step="1800">
                    </div>
                </div>
                <div class="field">
                    <label>Max Participants *</label>
                    <input type="number" min="1" value="10" required>
                </div>
                <div class="field">
                    <label>Location *</label>
                    <input type="text" placeholder="Address or place name" required>
                </div>
                <div class="field">
                    <label>Description</label>
                    <textarea placeholder="Add details about your event"></textarea>
                </div>
                <div class="field">
                    <label>Event Visibility *</label>
                    <div class="vis-options">
                        <label class="vis-opt">
                            <input type="radio" name="v" checked>
                            <div>
                                <span class="t">Public</span>
                                <span class="d">Visible in calendar, searchable</span>
                            </div>
                        </label>
                        <label class="vis-opt">
                            <input type="radio" name="v">
                            <div>
                                <span class="t">Private</span>
                                <span class="d">Accessible via signup link only</span>
                            </div>
                        </label>
                    </div>
                </div>
                <button type="submit" class="btn">Create Event</button>
            </form>
        </div>
    </main>
</body>
</html>
